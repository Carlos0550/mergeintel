services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    restart: unless-stopped
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-claude-sonnet-4-20250514}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/mergeintel}
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8000}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MergeIntel}
      MAIL_SERVER: ${MAIL_SERVER:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_STARTTLS: ${MAIL_STARTTLS:-false}
      MAIL_SSL_TLS: ${MAIL_SSL_TLS:-false}
      MAIL_USE_CREDENTIALS: ${MAIL_USE_CREDENTIALS:-false}
      MAIL_VALIDATE_CERTS: ${MAIL_VALIDATE_CERTS:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      - mailpit
    volumes:
      - .:/app
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
