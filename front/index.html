<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="AI-powered PR analysis for engineering teams."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MergeIntel — AI-Powered PR Analysis</title>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true
      );
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
